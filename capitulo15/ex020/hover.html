<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            color: white;
            background-color: red;
            width: 300px;
        }
    
    </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passe o mause sbre o texto abaixo</p>
    <div>
        passe o mause aqui
        <p>TEXTO ESCONDIDO...</p>

    </div>
    <P>Fim do exemplo</P>
    
</body>
</html>
