<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizando Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
        }

        a:visited {
            color: black;
        }

        a:hover {
            color: black;
        }

        a:active {
            color: chartreuse;
        }

        a::after {
            content: '<*';
        }

        a::before {
            content: '*>';
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="www.google.com">Site do Google</a></li>
        <li><a href="www.youtube.com">Site do Youtube</a></li>
        <li><a href="www.facebook.com">Site do Facebook</a></li>
    </ul>
    
</body>
</html>
